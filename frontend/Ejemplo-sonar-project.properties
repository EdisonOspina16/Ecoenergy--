sonar.projectKey= "Aquí va el nombre de tu proyecto en SonarQube, por ejemplo: EcoEnergyBackend"
sonar.host.url= "Aquí va la URL de tu servidor SonarQube, por ejemplo: http://localhost:9000"
sonar.token = "Aquí va tu token de SonarQube"

sonar.exclusions=node_modules/*,.next/,dist/,build/*

sonar.sources=src
sonar.tests=test

sonar.test.inclusions=*/.test.js,*/.test.ts,*/.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

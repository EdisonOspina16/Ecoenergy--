# docker-compose.jenkins.yml - Infraestructura CI/CD (Jenkins + SonarQube)
version: '3.8'

services:
  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube-server
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - ci-net
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    # Nota: SonarQube requiere vm.max_map_count=262144 en el host para ElasticSearch

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-ci
    privileged: true
    user: root
    restart: unless-stopped
    depends_on:
      - sonarqube
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - ci-net
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/var/jenkins_home/workspace/ecoenergy
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

networks:
  ci-net:
    driver: bridge

volumes:
  jenkins_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs: